<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; /* خلفية داكنة مريحة للعين */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .container {
            max-width: 600px; /* تحديد أقصى عرض لتناسب الهواتف والشاشات */
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }

        .quran-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px; /* زوايا منحنية مريحة للمظهر */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); /* ظل خفيف خلف الصورة */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="pictures.png" alt="سورة الكهف كاملة" class="quran-image">
    </div>

</body>
</html>
