<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف</title>
    <style>
        :root {
            --bg-body: #f4ece1;
            --bg-container: #fcf8f2;
            --text-color: #333;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-color: #fff;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* لوحة التحكم الأزرار العائمة */
        .control-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            background-color: #b58d53;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 18px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px 15px 80px 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .quran-image {
            width: 100%;
            height: auto;
            display: block;
            background-color: var(--bg-container);
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--shadow);
            padding: 10px;
            box-sizing: border-box;
            transition: background 0.3s;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <button class="btn" id="themeBtn" title="تغيير الوضع">🌙</button>
        <button class="btn" id="scrollBtn" title="تمرير تلقائي">▶️</button>
    </div>

    <div class="container">
        <img src="pictures.png" alt="سورة الكهف كاملة" class="quran-image">
    </div>

    <script>
        // 1. كود التبديل بين الوضع الليلي والنهاري
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            }
        });

        // 2. كود التمرير التلقائي
        const scrollBtn = document.getElementById('scrollBtn');
        let scrollInterval = null;
        let isScrolling = false;

        scrollBtn.addEventListener('click', () => {
            if (!isScrolling) {
                scrollInterval = setInterval(() => {
                    window.scrollBy(0, 1); // يتحرك ببطء شديد يناسب القراءة المريحة
                }, 30); 
                scrollBtn.textContent = '⏸️';
                isScrolling = true;
            } else {
                clearInterval(scrollInterval);
                scrollBtn.textContent = '▶️';
                isScrolling = false;
            }
        });
    </script>
</body>
</html>
