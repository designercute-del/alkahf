<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف</title>
    <style>
        :root {
            --bg-body: #f4ece1;
            --bg-container: #fcf8f2;
            --bg-header: rgba(244, 236, 225, 0.95);
            --text-color: #333;
            --shadow: rgba(0, 0, 0, 0.05);
            --img-filter: none;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --bg-header: rgba(18, 18, 18, 0.95);
            --text-color: #f4ece1;
            --shadow: rgba(0, 0, 0, 0.4);
            --img-filter: invert(100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* شريط علوي ثابت للأزرار خارج منطقة النص */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: var(--bg-header);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 10px var(--shadow);
            z-index: 1000;
            transition: background-color 0.3s;
        }

        .btn {
            background-color: #b58d53;
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.3s;
        }
        .btn:active { transform: scale(0.95); }

        [data-theme="dark"] .btn {
            background-color: #f4ece1;
            color: #121212;
        }

        /* حاوية الصورة - تحافظ على حجم ثابت ومناسب في كل الأوضاع */
        .container {
            max-width: 600px; /* الحجم الأصلي المناسب والمريح */
            width: 100%;
            padding: 80px 15px 40px 15px; 
            box-sizing: border-box;
            text-align: center;
        }

        .quran-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 25px var(--shadow);
            padding: 8px;
            box-sizing: border-box;
            filter: var(--img-filter);
            transition: filter 0.3s ease;
        }
    </style>
</head>
<body>

    <!-- الشريط العلوي الثابت -->
    <header class="top-header">
        <button class="btn" id="themeBtn">
            <span id="themeIcon">🌙</span> <span id="themeText">الوضع الليلي</span>
        </button>
        <button class="btn" id="scrollBtn">
            <span>▶️</span> التمرير التلقائي
        </button>
    </header>

    <div class="container">
        <!-- تأكد من مطابقة اسم ملف الصورة المرفوع لديك (pictures.png أو pictures.jpg) -->
        <img src="pictures.png" alt="سورة الكهف كاملة" class="quran-image">
    </div>

    <script>
        // نظام تبديل وحفظ الوضع
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                themeIcon.textContent = '☀️';
                themeText.textContent = 'الوضع النهاري';
            }
        }

        themeBtn.addEventListener('click', () => {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'الوضع الليلي';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'الوضع النهاري';
                localStorage.setItem('theme', 'dark');
            }
        });

        // نظام التمرير التلقائي البطيء والموزون
        const scrollBtn = document.getElementById('scrollBtn');
        let scrollInterval = null;
        let isScrolling = false;

        scrollBtn.addEventListener('click', () => {
            if (!isScrolling) {
                // تم زيادة الوقت الملي ثانية لتقليل السرعة وجعلها هادئة تماماً
                scrollInterval = setInterval(() => {
                    window.scrollBy(0, 1); 
                }, 55); 
                scrollBtn.innerHTML = '<span>⏸️</span> إيقاف مؤقت';
                isScrolling = true;
            } else {
                clearInterval(scrollInterval);
                scrollBtn.innerHTML = '<span>▶️</span> التمرير التلقائي';
                isScrolling = false;
            }
        });
    </script>
</body>
</html>
