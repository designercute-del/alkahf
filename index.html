<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4ece1; /* لون بيج مريح جداً للعين ومناسب للمصاحف */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .container {
            max-width: 600px; /* لتظهر بشكل متناسق على الجوال والكمبيوتر */
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .quran-image {
            width: 100%;
            height: auto;
            display: block;
            background-color: #fcf8f2; /* لون أفتح قليلاً خلف الصورة لتبز الكلمات الشفافة */
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); /* ظل خفيف جداً وناعم */
            padding: 10px; /* مسافة داخلية صغيرة حول الصورة */
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- تأكد أن اسم الصورة يطابق اسم ملفك تماماً -->
        <img src="pictures.png" alt="سورة الكهف كاملة" class="quran-image">
    </div>

</body>
</html>
