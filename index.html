<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سورة الكهف</title>
    <style>
        :root {
            /* متغيرات الوضع النهاري */
            --bg-body: #f4ece1;
            --bg-container: #fcf8f2;
            --text-color: #333;
            --shadow: rgba(0, 0, 0, 0.08);
            /* فلتر الصورة في الوضع النهاري (لا يوجد تغيير) */
            --img-filter: none;
        }

        [data-theme="dark"] {
            /* متغيرات الوضع الليلي */
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-color: #f4ece1; /* لون النص في لوحة التحكم */
            --shadow: rgba(0, 0, 0, 0.5);
            
            /* السحر هنا: عكس ألوان الصورة (100% invert) */
            /* هذا سيحول النص الأسود إلى أبيض */
            --img-filter: invert(100%);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
            transition: background 0.3s, color 0.3s;
        }

        /* لوحة التحكم الأزرار العائمة */
        .control-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            background-color: #b58d53; /* لون ذهبي رمزي */
            color: #121212; /* لون الأيقونة */
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 18px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.3s;
        }
        .btn:active { transform: scale(0.95); }

        [data-theme="dark"] .btn {
            background-color: #f4ece1; /* تغيير لون الأزرار في الوضع الليلي لتبرز */
            color: #121212;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px 15px 80px 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .quran-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--shadow);
            padding: 10px;
            box-sizing: border-box;
            
            /* تطبيق الفلتر الخاص بالصورة */
            filter: var(--img-filter);
            
            /* إضافة خاصية نعومة لتبديل الألوان */
            transition: filter 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <button class="btn" id="themeBtn" title="تغيير الوضع">🌙</button>
        <button class="btn" id="scrollBtn" title="تمرير تلقائي">▶️</button>
    </div>

    <div class="container">
        <img src="pictures.png" alt="سورة الكهف كاملة" class="quran-image">
    </div>

    <script>
        // كود التبديل بين الوضع الليلي والنهاري (محدث بالأيقونات وحفظ التفضيل)
        const themeBtn = document.getElementById('themeBtn');
        const currentTheme = localStorage.getItem('theme');

        // تطبيق الوضع المحفوظ سابقاً عند التحميل
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            themeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        }

        themeBtn.addEventListener('click', () => {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        // كود التمرير التلقائي البسيط (كما في الكود السابق)
        const scrollBtn = document.getElementById('scrollBtn');
        let scrollInterval = null;
        let isScrolling = false;

        scrollBtn.addEventListener('click', () => {
            if (!isScrolling) {
                scrollInterval = setInterval(() => {
                    window.scrollBy(0, 1); 
                }, 30); 
                scrollBtn.textContent = '⏸️';
                isScrolling = true;
            } else {
                clearInterval(scrollInterval);
                scrollBtn.textContent = '▶️';
                isScrolling = false;
            }
        });
    </script>
</body>
</html>
